<!DOCTYPE html>
<html>
<head>
    <title>HTML DOM Example</title>
</head>
<body>

    <h1 id="heading">Welcome to JavaScript</h1>
    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("heading").innerHTML = "HTML DOM Changed!";
        }
    </script>

</body>
</html>
